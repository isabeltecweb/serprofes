<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi BB Hemoxo - Precio Infinito</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contenedor-principal">
        <div class="tarjeta-bb">
            <div class="contenedor-foto">
                <img src="bb hemoxo.jpg" alt="Mi bebé peludo hermoso">
            </div>
            <div class="contenido">
                <h1 class="titulo">Mi Compañero Fiel</h1>
                <p class="descripcion">
                    En esa mirada noble y sabia se refleja una vida llena de lealtad y amor incondicional. 
                    Sus ojitos tiernos, llenos de historias, y su sonrisa sincera nos recuerdan que la verdadera 
                    belleza madura con el tiempo.
                </p>
                <!-- Sección del precio infinito -->
                <div class="precio-infinito">
                    <span class="etiqueta">Valor:</span>
                    <span class="simbolo">∞</span>
                </div>
                <div class="etiqueta-amor">Amor Incalculable ❤️</div>
            </div>
        </div>
    </div>
</body>
</html>
